###############################################################################
# oxo-online — CI/CD pipeline
#
# Monorepo note:
#   This workflow only triggers on changes under work/oxo-online/**.
#   Each project under work/ has its own workflow named deploy-<project>.yml
#   with a matching paths filter. Working directories are all absolute from
#   the repo root.
#
# Triggers:
#   push to main  → full pipeline: install → lint → test → build → deploy
#   pull_request  → install → lint → test → build only (no deploy)
#
# Auth:
#   GitHub OIDC → AWS role assume. No static AWS keys stored anywhere.
#   Role ARN stored in GitHub secret: OXO_ONLINE_DEPLOY_ROLE_ARN
#
# GitHub Actions variables (not secrets — not sensitive):
#   OXO_ONLINE_AWS_REGION               e.g. eu-west-2
#   OXO_ONLINE_CLOUDFRONT_DISTRIBUTION  CloudFront distribution ID
#   OXO_ONLINE_S3_BUCKET                S3 bucket name
#   OXO_ONLINE_PROD_URL                 e.g. https://d3pf3kcvzpau1x.cloudfront.net
#   OXO_ONLINE_LAMBDA_FUNCTION_NAME     Lambda function name for game fn UpdateFunctionCode
#                                       (set to the value of the LambdaFunctionName
#                                       CfnOutput from OxoGameProd stack — e.g. oxo-game-fn)
#   OXO_ONLINE_WS_LAMBDA_FUNCTION_NAME  Lambda function name for WS fn UpdateFunctionCode
#                                       (set to the value of the WsLambdaFunctionName
#                                       CfnOutput from OxoGameProd stack — e.g. oxo-ws-fn)
#                                       Added slice 005. Same hot-swap pattern as game fn.
#
# GitHub Actions secrets:
#   OXO_ONLINE_DEPLOY_ROLE_ARN          IAM role ARN (from OxoOnlineOidcStack output)
#   ACM_CERT_ARN                        (optional) ACM cert ARN for custom domain — used by manual CDK deploy only
#   HOSTED_ZONE_ID                      (optional) Route 53 zone ID — used by manual CDK deploy only
#
# Note: CDK infra changes are NOT deployed by this pipeline. CDK is in the
# infra-oxo-online.yml pipeline. This pipeline handles: SPA (S3 sync +
# CloudFront invalidation) + Lambda code update when src/lambda/** changes.
#
# GitHub Actions variables (optional — custom domain):
#   OXO_ONLINE_DOMAIN_NAME              e.g. oxo.example.com
#
# Pre-requisites before first run:
#   1. Deploy OxoOnlineOidcStack once manually (make deploy-oidc).
#   2. Add the DeployRoleArn output as secret OXO_ONLINE_DEPLOY_ROLE_ARN.
#   3. Add the variables above.
###############################################################################

name: oxo-online — deploy

on:
  push:
    branches:
      - main
    paths:
      - 'work/oxo-online/src/app/**'
      - 'work/oxo-online/src/lambda/**'
      - '.github/workflows/deploy-oxo-online.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'work/oxo-online/src/app/**'
      - 'work/oxo-online/src/lambda/**'
      - '.github/workflows/deploy-oxo-online.yml'

concurrency:
  group: deploy-oxo-online-prod
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.OXO_ONLINE_AWS_REGION || 'eu-west-2' }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ---------------------------------------------------------------------------
  # build — runs on every push and every PR
  # ---------------------------------------------------------------------------
  build:
    name: Install / Lint / Test / Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: work/oxo-online/src/app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: work/oxo-online/src/app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test -- --run

      - name: Build SPA
        run: npm run build

      - name: Upload build artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: oxo-online-spa-build
          path: work/oxo-online/src/app/build/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # deploy — runs only on push to main; depends on build
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to Production
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.OXO_ONLINE_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: oxo-online-deploy-${{ github.run_id }}

      # CDK infra changes are deployed manually via `make deploy` in work/oxo-online/src/infra.
      # The pipeline only handles app deployment: S3 sync + CloudFront invalidation.
      # This keeps the OIDC role permissions minimal (S3 + CloudFront only, no IAM/CFN).

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: oxo-online-spa-build
          path: spa-build/

      - name: Sync HTML files (no-cache)
        run: |
          aws s3 sync spa-build/ s3://${{ vars.OXO_ONLINE_S3_BUCKET }}/ \
            --region ${{ env.AWS_REGION }} \
            --exclude "*" --include "*.html" \
            --cache-control "no-cache, no-store, must-revalidate" \
            --delete

      - name: Sync JS/CSS bundles (1-year cache)
        run: |
          aws s3 sync spa-build/static/ s3://${{ vars.OXO_ONLINE_S3_BUCKET }}/static/ \
            --region ${{ env.AWS_REGION }} \
            --cache-control "public, max-age=31536000, immutable"

      - name: Sync remaining assets (1-day cache)
        run: |
          aws s3 sync spa-build/ s3://${{ vars.OXO_ONLINE_S3_BUCKET }}/ \
            --region ${{ env.AWS_REGION }} \
            --exclude "*.html" --exclude "static/*" \
            --cache-control "public, max-age=86400"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.OXO_ONLINE_CLOUDFRONT_DISTRIBUTION }} \
            --paths "/*"

      # -------------------------------------------------------------------------
      # Lambda code update — only runs when work/oxo-online/src/lambda/** changed.
      #
      # The oxo-deploy role must have lambda:UpdateFunctionCode on each function ARN.
      # See work/oxo-online/src/infra/DEPLOY_ROLE_EXTENSIONS.md for the permissions
      # that must be added to the role before this step will work.
      #
      # OXO_ONLINE_LAMBDA_FUNCTION_NAME is a GitHub Actions variable (not a secret):
      # set it to the LambdaFunctionName CfnOutput value from the OxoGameProd stack
      # (e.g. "oxo-game-fn").
      #
      # OXO_ONLINE_WS_LAMBDA_FUNCTION_NAME is a GitHub Actions variable (not a secret):
      # set it to the WsLambdaFunctionName CfnOutput value from the OxoGameProd stack
      # (e.g. "oxo-ws-fn"). Added slice 005.
      # -------------------------------------------------------------------------
      - name: Detect Lambda source changes
        id: lambda-changed
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- work/oxo-online/src/lambda/ 2>/dev/null | wc -l)
          if [ "$CHANGED" -gt "0" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Package Lambda source
        if: steps.lambda-changed.outputs.changed == 'true'
        run: |
          zip -r /tmp/lambda-package.zip work/oxo-online/src/lambda/ -x "*.test.*" -x "*/node_modules/.cache/*"

      - name: Deploy game Lambda code (oxo-game-fn)
        if: steps.lambda-changed.outputs.changed == 'true' && vars.OXO_ONLINE_LAMBDA_FUNCTION_NAME != ''
        run: |
          aws lambda update-function-code \
            --function-name ${{ vars.OXO_ONLINE_LAMBDA_FUNCTION_NAME }} \
            --zip-file fileb:///tmp/lambda-package.zip \
            --region ${{ env.AWS_REGION }}

      - name: Deploy WS Lambda code (oxo-ws-fn)
        if: steps.lambda-changed.outputs.changed == 'true' && vars.OXO_ONLINE_WS_LAMBDA_FUNCTION_NAME != ''
        run: |
          aws lambda update-function-code \
            --function-name ${{ vars.OXO_ONLINE_WS_LAMBDA_FUNCTION_NAME }} \
            --zip-file fileb:///tmp/lambda-package.zip \
            --region ${{ env.AWS_REGION }}

      # -------------------------------------------------------------------------
      # wss URL injection — writes runtime config to S3 so the SPA knows the
      # WebSocket endpoint without baking it into the bundle at build time.
      #
      # The SPA reads window.OXO_CONFIG (injected via /config.js on the S3 bucket)
      # instead of a build-time constant. This means a CDK-generated endpoint URL
      # can change without requiring a new SPA build.
      #
      # Mechanism (chosen slice 005):
      #   1. Fetch the OxoGameProd-WsApiEndpoint CloudFormation export (the wss://
      #      URL including /prod stage) using aws cloudformation describe-stacks.
      #   2. Write a minimal JS file: window.OXO_CONFIG={wsUrl:"wss://..."};
      #   3. Upload to s3://<bucket>/config.js with no-cache headers so browsers
      #      always fetch the latest value.
      #
      # The SPA's index.html must include <script src="/config.js"></script> before
      # the main bundle so OXO_CONFIG is defined at runtime. The engineer wires this
      # in the SPA template; the deploy step only writes the file.
      #
      # Why this mechanism (not build-time env var):
      #   The WSS endpoint URL contains the API Gateway ID, which is only known
      #   after CDK deploys OxoGameProd. Baking it into the Vite build would require
      #   the infra pipeline to trigger the app pipeline — coupling the two pipelines.
      #   Runtime config injection decouples them: the app pipeline reads the live
      #   CloudFormation export at deploy time, not at build time.
      #
      # Why CloudFormation describe-stacks (not SSM):
      #   OxoGameProd already outputs OxoGameProd-WsApiEndpoint as a CfnOutput.
      #   Reading it directly via describe-stacks requires no extra infra (no SSM
      #   write in OxoGameStack, no new IAM permission beyond cloudformation:DescribeStacks
      #   which the oxo-deploy role already has from the CDK helpers). SSM would need
      #   an additional write in the CDK stack and a new SSM read permission.
      #
      # The oxo-deploy role needs cloudformation:DescribeStacks on OxoGameProd ARN.
      # See DEPLOY_ROLE_EXTENSIONS.md — this is a new permission for slice 005.
      # -------------------------------------------------------------------------
      - name: Fetch wss URL from CloudFormation and write runtime config
        run: |
          WSS_URL=$(aws cloudformation describe-stacks \
            --stack-name OxoGameProd \
            --region ${{ env.AWS_REGION }} \
            --query "Stacks[0].Outputs[?OutputKey=='WsApiEndpoint'].OutputValue" \
            --output text)
          if [ -z "$WSS_URL" ] || [ "$WSS_URL" = "None" ]; then
            echo "WARNING: OxoGameProd WsApiEndpoint output not found — config.js will have empty wsUrl."
            WSS_URL=""
          fi
          printf 'window.OXO_CONFIG=%s;\n' "{\"wsUrl\":\"${WSS_URL}\"}" > /tmp/config.js
          aws s3 cp /tmp/config.js s3://${{ vars.OXO_ONLINE_S3_BUCKET }}/config.js \
            --region ${{ env.AWS_REGION }} \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "application/javascript"

      - name: Record DORA deploy event
        run: |
          python .claude/skills/dora-ledger/scripts/dora.py record \
            --project oxo-online --iteration 4 --slice 004-create-game \
            --agent cicd --event deploy --outcome success \
            --ref "${{ github.sha }}" \
            --note "Automated deploy via GitHub Actions run ${{ github.run_id }}"
        continue-on-error: true

      - name: Install app dependencies
        working-directory: work/oxo-online/src/app
        run: npm ci

      - name: Install Playwright
        working-directory: work/oxo-online/src/app
        run: npx playwright install --with-deps chromium

      - name: Smoke test — prod URL
        working-directory: work/oxo-online/src/app
        run: npx playwright test --config=playwright.config.ts tests/smoke/
        env:
          PROD_URL: ${{ vars.OXO_ONLINE_PROD_URL }}

      - name: Record DORA failure event
        if: failure()
        run: |
          python .claude/skills/dora-ledger/scripts/dora.py record \
            --project oxo-online --iteration 4 --slice 004-create-game \
            --agent cicd --event failure --outcome fail \
            --ref "${{ github.sha }}" \
            --note "Deploy or smoke test failed — run ${{ github.run_id }}"
        continue-on-error: true
