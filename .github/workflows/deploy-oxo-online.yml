###############################################################################
# oxo-online — CI/CD pipeline
#
# Monorepo note:
#   This workflow only triggers on changes under work/oxo-online/**.
#   Each project under work/ has its own workflow named deploy-<project>.yml
#   with a matching paths filter. Working directories are all absolute from
#   the repo root.
#
# Triggers:
#   push to main  → full pipeline: install → lint → test → build → deploy
#   pull_request  → install → lint → test → build only (no deploy)
#
# Auth:
#   GitHub OIDC → AWS role assume. No static AWS keys stored anywhere.
#   Role ARN stored in GitHub secret: OXO_ONLINE_DEPLOY_ROLE_ARN
#
# GitHub Actions variables (not secrets — not sensitive):
#   OXO_ONLINE_AWS_REGION               e.g. eu-west-2
#   OXO_ONLINE_CLOUDFRONT_DISTRIBUTION  CloudFront distribution ID
#   OXO_ONLINE_S3_BUCKET                S3 bucket name
#   OXO_ONLINE_PROD_URL                 e.g. https://d3pf3kcvzpau1x.cloudfront.net
#
# GitHub Actions secrets:
#   OXO_ONLINE_DEPLOY_ROLE_ARN          IAM role ARN (from OxoOnlineOidcStack output)
#   ACM_CERT_ARN                        (optional) ACM cert ARN for custom domain — used by manual CDK deploy only
#   HOSTED_ZONE_ID                      (optional) Route 53 zone ID — used by manual CDK deploy only
#
# Note: CDK infra changes are NOT deployed by this pipeline. CDK is in the
# infra-oxo-online.yml pipeline. This pipeline handles: SPA (S3 sync +
# CloudFront invalidation + invalidation wait) + wss URL runtime config injection.
#
# Lambda code is NEVER deployed by this pipeline. All Lambda code deploys go
# through infra-oxo-online.yml (CDK fromAsset), which builds the correct compiled
# JS from src/lambda/**. Hot-swap was removed (OI-24) because:
#   1. It zipped raw TypeScript — un-runnable in Lambda (Node.js executes JS).
#   2. Both pipelines triggered on src/lambda/** — a dual-trigger race with the
#      CDK deploy that owns the correct compiled asset.
#   3. CDK fromAsset already handles Lambda code deploy on every infra push.
# See work/oxo-online/src/infra/STACK_ORDER.md for the definitive Lambda
# code-deploy ownership record.
#
# GitHub Actions variables (optional — custom domain):
#   OXO_ONLINE_DOMAIN_NAME              e.g. oxo.example.com
#
# Pre-requisites before first run:
#   1. Deploy OxoOnlineOidcStack once manually (make deploy-oidc).
#   2. Add the DeployRoleArn output as secret OXO_ONLINE_DEPLOY_ROLE_ARN.
#   3. Add the variables above.
###############################################################################

name: oxo-online — deploy

on:
  # Manual trigger so a fix landing OUTSIDE src/app/** (e.g. s007a's authorizer +
  # runner-IP-tooling exemption, DEFECT-S007-001) can be PROVEN against prod smoke
  # without a no-op app edit — the deploy+smoke surface is re-runnable on demand.
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'work/oxo-online/src/app/**'
      - '.github/workflows/deploy-oxo-online.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'work/oxo-online/src/app/**'
      - '.github/workflows/deploy-oxo-online.yml'

concurrency:
  group: deploy-oxo-online-prod
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.OXO_ONLINE_AWS_REGION || 'eu-west-2' }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ---------------------------------------------------------------------------
  # build — runs on every push and every PR
  # ---------------------------------------------------------------------------
  build:
    name: Install / Lint / Test / Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: work/oxo-online/src/app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: work/oxo-online/src/app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test -- --run

      - name: Build SPA
        # OI-25 (principles/01): VITE_BUILD_SHA bakes the commit sha into the
        # bundle at build time. Vite substitutes %VITE_BUILD_SHA% in index.html
        # and exposes the value via import.meta.env.VITE_BUILD_SHA in JS.
        # Smoke step gates on served meta[name="build-sha"] == github.sha BEFORE
        # asserting behaviour — §39-correct distribution timing check.
        env:
          VITE_BUILD_SHA: ${{ github.sha }}
        run: npm run build

      - name: Upload build artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: oxo-online-spa-build
          path: work/oxo-online/src/app/build/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # deploy — runs only on push to main; depends on build
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to Production
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.OXO_ONLINE_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: oxo-online-deploy-${{ github.run_id }}

      # CDK infra changes are deployed by infra-oxo-online.yml (CDK fromAsset).
      # This pipeline handles app deployment only: S3 sync + CloudFront invalidation
      # (with invalidation wait) + wss URL runtime config injection.
      # OIDC role permissions: S3 + CloudFront + cloudformation:DescribeStacks only.

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: oxo-online-spa-build
          path: spa-build/

      - name: Sync HTML files (no-cache)
        run: |
          aws s3 sync spa-build/ s3://${{ vars.OXO_ONLINE_S3_BUCKET }}/ \
            --region ${{ env.AWS_REGION }} \
            --exclude "*" --include "*.html" \
            --cache-control "no-cache, no-store, must-revalidate" \
            --delete

      - name: Sync JS/CSS bundles (1-year cache)
        run: |
          aws s3 sync spa-build/static/ s3://${{ vars.OXO_ONLINE_S3_BUCKET }}/static/ \
            --region ${{ env.AWS_REGION }} \
            --cache-control "public, max-age=31536000, immutable"

      - name: Sync remaining assets (1-day cache)
        run: |
          aws s3 sync spa-build/ s3://${{ vars.OXO_ONLINE_S3_BUCKET }}/ \
            --region ${{ env.AWS_REGION }} \
            --exclude "*.html" --exclude "static/*" \
            --cache-control "public, max-age=86400"

      - name: Invalidate CloudFront cache
        id: cf-invalidation
        run: |
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id ${{ vars.OXO_ONLINE_CLOUDFRONT_DISTRIBUTION }} \
            --paths "/*" \
            --query 'Invalidation.Id' \
            --output text)
          echo "invalidation_id=${INVALIDATION_ID}" >> "$GITHUB_OUTPUT"

      - name: Wait for CloudFront invalidation to complete
        # Ensures smoke tests run against the fully propagated build, not stale
        # edge cache. Prevents false-negative smoke failures (OI-23 fix).
        run: |
          aws cloudfront wait invalidation-completed \
            --distribution-id ${{ vars.OXO_ONLINE_CLOUDFRONT_DISTRIBUTION }} \
            --id ${{ steps.cf-invalidation.outputs.invalidation_id }}

      # -------------------------------------------------------------------------
      # Lambda code deploy is owned exclusively by infra-oxo-online.yml (CDK
      # fromAsset). Hot-swap steps removed in slice 005 (OI-24). Rationale:
      #   - Raw TypeScript is un-runnable in Lambda; CDK compiles and packages.
      #   - Dual-trigger race: both pipelines triggered on src/lambda/** — removed
      #     src/lambda/** from this workflow's path filter to eliminate the race.
      #   - CDK fromAsset handles every Lambda code deploy correctly on infra push.
      # See STACK_ORDER.md for Lambda code-deploy ownership documentation.
      # -------------------------------------------------------------------------

      # -------------------------------------------------------------------------
      # wss URL injection — writes runtime config to S3 so the SPA knows the
      # WebSocket endpoint without baking it into the bundle at build time.
      #
      # The SPA reads window.OXO_CONFIG (injected via /config.js on the S3 bucket)
      # instead of a build-time constant. This means a CDK-generated endpoint URL
      # can change without requiring a new SPA build.
      #
      # Mechanism (chosen slice 005):
      #   1. Fetch the OxoGameProd-WsApiEndpoint CloudFormation export (the wss://
      #      URL including /prod stage) using aws cloudformation describe-stacks.
      #   2. Write a minimal JS file: window.OXO_CONFIG={wsUrl:"wss://..."};
      #   3. Upload to s3://<bucket>/config.js with no-cache headers so browsers
      #      always fetch the latest value.
      #
      # The SPA's index.html must include <script src="/config.js"></script> before
      # the main bundle so OXO_CONFIG is defined at runtime. The engineer wires this
      # in the SPA template; the deploy step only writes the file.
      #
      # Why this mechanism (not build-time env var):
      #   The WSS endpoint URL contains the API Gateway ID, which is only known
      #   after CDK deploys OxoGameProd. Baking it into the Vite build would require
      #   the infra pipeline to trigger the app pipeline — coupling the two pipelines.
      #   Runtime config injection decouples them: the app pipeline reads the live
      #   CloudFormation export at deploy time, not at build time.
      #
      # Why CloudFormation describe-stacks (not SSM):
      #   OxoGameProd already outputs OxoGameProd-WsApiEndpoint as a CfnOutput.
      #   Reading it directly via describe-stacks requires no extra infra (no SSM
      #   write in OxoGameStack, no new IAM permission beyond cloudformation:DescribeStacks
      #   which the oxo-deploy role already has from the CDK helpers). SSM would need
      #   an additional write in the CDK stack and a new SSM read permission.
      #
      # The oxo-deploy role needs cloudformation:DescribeStacks on OxoGameProd ARN.
      # See DEPLOY_ROLE_EXTENSIONS.md — this is a new permission for slice 005.
      # -------------------------------------------------------------------------
      - name: Fetch wss URL from CloudFormation and write runtime config
        run: |
          WSS_URL=$(aws cloudformation describe-stacks \
            --stack-name OxoGameProd \
            --region ${{ env.AWS_REGION }} \
            --query "Stacks[0].Outputs[?OutputKey=='WsApiEndpoint'].OutputValue" \
            --output text)
          if [ -z "$WSS_URL" ] || [ "$WSS_URL" = "None" ]; then
            echo "WARNING: OxoGameProd WsApiEndpoint output not found — config.js will have empty wsUrl."
            WSS_URL=""
          fi
          # config.js carries ONLY the WS url — every SPA feature flag has been
          # factored out at its slice's delivery (§40 code-then-config):
          #   - s006 uc4Enabled            (server-authoritative move relay)
          #   - s009 uc1NameEnabled        (name entry)
          #   - s009 uc3LeaderboardEnabled (leaderboard panel)
          #   - s009 uc4TwoCopyEnabled     (two copy controls)
          # All four are now the UNCONDITIONAL SPA behaviour; no flag entry here.
          printf 'window.OXO_CONFIG=%s;\n' "{\"wsUrl\":\"${WSS_URL}\"}" > /tmp/config.js
          aws s3 cp /tmp/config.js s3://${{ vars.OXO_ONLINE_S3_BUCKET }}/config.js \
            --region ${{ env.AWS_REGION }} \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "application/javascript"

      - name: Record DORA s3-deploy event
        run: |
          python3 .claude/skills/dora-ledger/scripts/dora.py record \
            --project oxo-online --iteration 10 --slice s007-disconnect \
            --agent cicd --event deploy --outcome success \
            --ref "${{ github.sha }}" \
            --note "S3+CF deploy via GitHub Actions run ${{ github.run_id }}"
        continue-on-error: true

      - name: Set up Node 22 (smoke)
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: work/oxo-online/src/app/package-lock.json

      - name: Install app dependencies
        working-directory: work/oxo-online/src/app
        run: npm ci

      - name: Install Playwright
        working-directory: work/oxo-online/src/app
        run: npx playwright install --with-deps chromium

      # -----------------------------------------------------------------------
      # IMP-008 runner-IP exclusion (s007 UC2-S4 CI wire).
      # Detect the runner's public IP and add it to the oxo-test-runner-ips WAF
      # IP set so the CloudFront rate rule's NOT() scope-down lets CI smoke
      # traffic through without hitting the 100-req/5-min limit.
      # The remove step uses `if: always()` (trap semantics) so the IP is
      # cleaned up even if the smoke step fails.
      # The script uses --region us-east-1 internally (CLOUDFRONT WAF scope is
      # a hard AWS requirement); the job's default region (eu-west-2) does not
      # affect it. Fail-closed: non-zero exit aborts the job before smoke runs
      # (prevents false smoke failures that look like code bugs).
      # -----------------------------------------------------------------------
      - name: Detect runner IP
        id: runner-ip
        run: |
          IP=$(curl -sf https://checkip.amazonaws.com)
          echo "cidr=${IP}/32" >> "$GITHUB_OUTPUT"
          echo "Runner IP: ${IP}/32"

      - name: Add runner IP to WAF exclusion set
        run: node work/oxo-online/scripts/waf-runner-ip.js add ${{ steps.runner-ip.outputs.cidr }}

      - name: Smoke test — prod URL
        # OI-25: DEPLOY_SHA passed so shell.spec.ts can gate on
        # served meta[name="build-sha"] == deployed sha BEFORE behavioural
        # assertions (§39-correct CDN timing check; not sleep/wait).
        # OI-32: workers:1 in playwright.config.ts serialises tests to stay
        # within the 20-connects/5-min WAF WS rate limit.
        working-directory: work/oxo-online/src/app
        run: npx playwright test --config=playwright.config.ts tests/smoke/
        env:
          PROD_URL: ${{ vars.OXO_ONLINE_PROD_URL }}
          DEPLOY_SHA: ${{ github.sha }}

      - name: Remove runner IP from WAF exclusion set
        if: always()
        run: node work/oxo-online/scripts/waf-runner-ip.js remove ${{ steps.runner-ip.outputs.cidr }}

      - name: Record DORA deploy event (s007)
        if: success()
        run: |
          python3 .claude/skills/dora-ledger/scripts/dora.py record \
            --project oxo-online --iteration 10 --slice s007-disconnect \
            --agent cicd --event deploy --outcome success \
            --ref "${{ github.sha }}" \
            --note "Automated deploy via GitHub Actions run ${{ github.run_id }}"
        continue-on-error: true

      - name: Record DORA failure event
        if: failure()
        run: |
          python3 .claude/skills/dora-ledger/scripts/dora.py record \
            --project oxo-online --iteration 10 --slice s007-disconnect \
            --agent cicd --event failure --outcome fail \
            --ref "${{ github.sha }}" \
            --note "Deploy or smoke test failed — run ${{ github.run_id }}"
        continue-on-error: true
