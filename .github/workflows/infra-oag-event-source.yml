###############################################################################
# OagEventSource — infrastructure pipeline (slice-004+)
#
# Triggers on changes to the CDK infra source. Separate from the app CI
# pipeline (ci-oag-event-source.yml) so infra and app changes are independently
# deployable.
#
# Auth: GitHub OIDC — separate roles per account.
# The infra role in each account can assume CDK bootstrap execution roles.
# Bootstrap must be run with --trust <account-id> before first deploy.
#
# GitHub Actions secrets required:
#   OAG_AWS_ACCOUNT_ID          sandbox AWS account ID (533266989599)
#   OAG_INFRA_DEPLOY_ROLE_ARN   arn:aws:iam::<sandbox>:role/oag-infra-deploy
#   OAG_DASH0_SECRET_ARN        ARN of the Dash0 API key in Secrets Manager (sandbox)
#
#   OAG_DEV_ACCOUNT_ID          ids-dev account ID (484908302294)
#   OAG_DEV_DEPLOY_ROLE_ARN     arn:aws:iam::484908302294:role/oag-infra-deploy-dev
#   OAG_DEV_DASH0_SECRET_ARN    ARN of the Dash0 API key in Secrets Manager (ids-dev)
#
#   OAG_PROD_ACCOUNT_ID         ids-prod account ID (716403253029)
#   OAG_PROD_DEPLOY_ROLE_ARN    arn:aws:iam::716403253029:role/oag-infra-deploy-prod
#   OAG_PROD_DASH0_SECRET_ARN   ARN of the Dash0 API key in Secrets Manager (ids-prod)
#
# Pipeline pre-flight checklist (process v29 §19):
#   [x] OIDC trust uses StringLike for sub (repo:org/repo:ref:refs/heads/*)
#   [x] No GITHUB_ prefix env vars (reserved)
#   [x] Fail-fast config validation step first in every job
#   [x] environment: production gate on deploy-prod job (§F5 first-prod gate)
#   [x] npm install not npm ci (mac-generated lock may omit linux-x64 optionals)
#   [x] vitest run (not bare npm test) in test steps
#   [x] FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
#   [x] concurrency: deploy-oag-event-source-prod (scoped per project)
#   [x] StringLike on OIDC sub (not StringEquals) — tolerates ref-format variations
#   [x] No GITHUB_ prefix env vars — uses OAG_ and GH_ prefixes only
#
# §F5 gate: the FIRST real deploy to dev/prod requires the OIDC role to exist
# (one-time human bootstrap — see work/OagEventSource/runbook/dev-prod-deploy.md).
# The pipeline will fail-fast on missing secrets if the one-time setup has not
# been completed.
#
# HARD CONSTRAINT — ReadOnly SSO profiles:
#   ids-dev (484908302294) and ids-prod (716403253029) SSO profiles are
#   configured with sso_role_name = ReadOnly. The one-time `cdk bootstrap` and
#   `deploy-oidc` steps CANNOT be performed with those profiles. A human with
#   an elevated/admin role in each account must run the one-time commands
#   documented in work/OagEventSource/runbook/dev-prod-deploy.md before the
#   OAG_DEV_DEPLOY_ROLE_ARN / OAG_PROD_DEPLOY_ROLE_ARN secrets can be set.
###############################################################################

name: OagEventSource — infra

on:
  push:
    branches:
      - main
    paths:
      - 'work/OagEventSource/src/infra/**'
      - '.github/workflows/infra-oag-event-source.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'work/OagEventSource/src/infra/**'
      - '.github/workflows/infra-oag-event-source.yml'

concurrency:
  group: deploy-oag-event-source-prod
  cancel-in-progress: false  # never cancel an in-flight infra deploy

permissions:
  id-token: write
  contents: read

env:
  OAG_AWS_REGION: eu-west-2
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

###############################################################################
# Job 1: synth + policy-check + diff + deploy → SANDBOX
###############################################################################
jobs:
  infra-sandbox:
    name: CDK synth / policy-check / diff / deploy [sandbox]
    runs-on: ubuntu-latest

    steps:
      - name: Validate required config (fail-fast §process v15 §33)
        run: |
          missing=""
          [ -z "${{ secrets.OAG_AWS_ACCOUNT_ID }}" ]         && missing="$missing OAG_AWS_ACCOUNT_ID"
          [ -z "${{ secrets.OAG_INFRA_DEPLOY_ROLE_ARN }}" ]  && missing="$missing OAG_INFRA_DEPLOY_ROLE_ARN"
          [ -z "${{ secrets.OAG_DASH0_SECRET_ARN }}" ]       && missing="$missing OAG_DASH0_SECRET_ARN"
          if [ -n "$missing" ]; then
            echo "ERROR: missing required secrets:$missing"
            exit 1
          fi
          echo "All required secrets present."

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: work/OagEventSource/src/infra/package-lock.json

      - name: Install CDK dependencies
        # npm install (not ci) — lock generated on macOS/arm64 may omit
        # linux-x64 optional native packages (process §runner-environment note).
        working-directory: work/OagEventSource/src/infra
        run: npm install

      - name: Build CDK TypeScript
        working-directory: work/OagEventSource/src/infra
        run: npm run build

      - name: CDK synth (policy-check assertions + offline validation)
        # AC-19a/b/c: synth validates OTel layers, no Resource:*, PITR, KMS.
        # --quiet suppresses asset hash noise; template is written to cdk.out/.
        working-directory: work/OagEventSource/src/infra
        run: |
          npx cdk synth OagFeedStack --quiet \
            -c buildSha=${{ github.sha }}
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.OAG_AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ env.OAG_AWS_REGION }}
          DASH0_SECRET_ARN: ${{ secrets.OAG_DASH0_SECRET_ARN }}

      - name: Policy-check assertions (jest suite on synthesized template)
        # Runs the test/oag-feed-stack.policy.test.ts assertions:
        # AC-19a (OTel trio), AC-19b (no Resource:*), AC-19c (PITR+KMS),
        # plus CORS non-wildcard, read-only feed role, no TTL checks,
        # env-conditional table names, OIDC role assertions.
        working-directory: work/OagEventSource/src/infra
        run: npm test
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.OAG_AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ env.OAG_AWS_REGION }}
          DASH0_SECRET_ARN: ${{ secrets.OAG_DASH0_SECRET_ARN }}

      - name: Configure AWS credentials (OIDC — sandbox)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.OAG_INFRA_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.OAG_AWS_REGION }}
          role-session-name: oag-infra-sandbox-${{ github.run_id }}

      - name: CDK diff — OagFeedStack (sandbox)
        working-directory: work/OagEventSource/src/infra
        run: |
          npx cdk diff OagFeedStack \
            -c buildSha=${{ github.sha }}
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.OAG_AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ env.OAG_AWS_REGION }}
          DASH0_SECRET_ARN: ${{ secrets.OAG_DASH0_SECRET_ARN }}

      - name: CDK deploy — OagFeedStack sandbox (main only; §F5 human gate)
        # §F5: the FIRST deploy is a human gate (pipeline only runs after
        # the human approves bootstrap + secrets configured).
        # On PRs this step is skipped (diff is the PR gate).
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        working-directory: work/OagEventSource/src/infra
        run: |
          npx cdk deploy OagFeedStack --require-approval never \
            -c buildSha=${{ github.sha }}
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.OAG_AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ env.OAG_AWS_REGION }}
          DASH0_SECRET_ARN: ${{ secrets.OAG_DASH0_SECRET_ARN }}

      - name: Smoke gate — verify served sha == deployed sha (sandbox)
        # Smoke gate per principles/01: query the Function URL and assert
        # X-Service-Version == ${{ github.sha }}. Gated on main push + deploy.
        # The Function URL is discovered from CloudFormation outputs.
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          FUNCTION_URL=$(aws cloudformation describe-stacks \
            --stack-name OagFeedStack \
            --region ${{ env.OAG_AWS_REGION }} \
            --query "Stacks[0].Outputs[?OutputKey=='FunctionUrl'].OutputValue" \
            --output text)
          echo "Function URL: $FUNCTION_URL"

          SERVED_VERSION=$(curl -s -o /dev/null -D - "${FUNCTION_URL}streams/flight/events?after=-1" \
            | grep -i "x-service-version" | tr -d '\r' | awk '{print $2}')
          echo "Served version header: $SERVED_VERSION"

          if [ -z "$SERVED_VERSION" ]; then
            echo "WARNING: X-Service-Version header absent — smoke gate advisory (UC-18 not yet shipped)"
          elif [ "$SERVED_VERSION" != "${{ github.sha }}" ]; then
            echo "ERROR: served sha ($SERVED_VERSION) != deployed sha (${{ github.sha }})"
            exit 1
          else
            echo "Smoke gate PASS: served sha == deployed sha"
          fi

      - name: Record DORA deploy event (sandbox)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          python3 .claude/skills/dora-ledger/scripts/dora.py record \
            --project OagEventSource \
            --iteration 4 \
            --slice 004-pull-feed-walking-skeleton \
            --agent cicd \
            --event deploy \
            --ref "${{ github.sha }}" \
            --outcome success \
            --note "OagFeedStack sandbox deployed by CI (infra-oag-event-source.yml)"
        continue-on-error: true  # DORA record failure must not block deploy

###############################################################################
# Job 2: deploy → DEV (ids-dev 484908302294)
# Runs automatically on push to main after infra-sandbox succeeds.
# §F5 gate: OAG_DEV_DEPLOY_ROLE_ARN must be set (one-time human bootstrap).
###############################################################################
  deploy-dev:
    name: CDK deploy [dev — ids-dev 484908302294]
    runs-on: ubuntu-latest
    needs: infra-sandbox
    # Only run on push to main (not PRs); §F5 gate: fail-fast if role absent.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Validate required config — dev (fail-fast §process v15 §33)
        run: |
          missing=""
          [ -z "${{ secrets.OAG_DEV_ACCOUNT_ID }}" ]        && missing="$missing OAG_DEV_ACCOUNT_ID"
          [ -z "${{ secrets.OAG_DEV_DEPLOY_ROLE_ARN }}" ]   && missing="$missing OAG_DEV_DEPLOY_ROLE_ARN"
          [ -z "${{ secrets.OAG_DEV_DASH0_SECRET_ARN }}" ]  && missing="$missing OAG_DEV_DASH0_SECRET_ARN"
          if [ -n "$missing" ]; then
            echo "ERROR: missing required secrets for dev deploy:$missing"
            echo "Run work/OagEventSource/runbook/dev-prod-deploy.md one-time bootstrap first."
            exit 1
          fi
          echo "All required dev secrets present."

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: work/OagEventSource/src/infra/package-lock.json

      - name: Install CDK dependencies
        working-directory: work/OagEventSource/src/infra
        run: npm install

      - name: Build CDK TypeScript
        working-directory: work/OagEventSource/src/infra
        run: npm run build

      - name: Bundle Lambda handler asset (flight-feed-api)
        # The Lambda code asset must exist before cdk synth/deploy resolves the
        # fromAsset path. CI runs this before CDK steps (§process v29 §19).
        working-directory: work/OagEventSource/src/app
        run: npm install && npm run bundle:lambda

      - name: Configure AWS credentials (OIDC — dev)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.OAG_DEV_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.OAG_AWS_REGION }}
          role-session-name: oag-infra-dev-${{ github.run_id }}

      - name: CDK diff — OagFeedStack-dev
        working-directory: work/OagEventSource/src/infra
        run: |
          npx cdk diff OagFeedStack-dev \
            -c buildSha=${{ github.sha }}
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.OAG_DEV_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ env.OAG_AWS_REGION }}
          DASH0_SECRET_ARN: ${{ secrets.OAG_DEV_DASH0_SECRET_ARN }}

      - name: CDK deploy — OagFeedStack-dev
        working-directory: work/OagEventSource/src/infra
        run: |
          npx cdk deploy OagFeedStack-dev --require-approval never \
            -c buildSha=${{ github.sha }}
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.OAG_DEV_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ env.OAG_AWS_REGION }}
          DASH0_SECRET_ARN: ${{ secrets.OAG_DEV_DASH0_SECRET_ARN }}

      - name: Smoke gate — verify served sha == deployed sha (dev)
        run: |
          FUNCTION_URL=$(aws cloudformation describe-stacks \
            --stack-name OagFeedStack-dev \
            --region ${{ env.OAG_AWS_REGION }} \
            --query "Stacks[0].Outputs[?OutputKey=='FunctionUrl'].OutputValue" \
            --output text)
          echo "Dev Function URL: $FUNCTION_URL"

          SERVED_VERSION=$(curl -s -o /dev/null -D - "${FUNCTION_URL}streams/flight/events?after=-1" \
            | grep -i "x-service-version" | tr -d '\r' | awk '{print $2}')
          echo "Served version header: $SERVED_VERSION"

          if [ -z "$SERVED_VERSION" ]; then
            echo "WARNING: X-Service-Version header absent — smoke gate advisory"
          elif [ "$SERVED_VERSION" != "${{ github.sha }}" ]; then
            echo "ERROR: served sha ($SERVED_VERSION) != deployed sha (${{ github.sha }})"
            exit 1
          else
            echo "Smoke gate PASS: served sha == deployed sha [dev]"
          fi

      - name: Record DORA deploy event (dev)
        run: |
          python3 .claude/skills/dora-ledger/scripts/dora.py record \
            --project OagEventSource \
            --iteration 4 \
            --slice 004-pull-feed-walking-skeleton \
            --agent cicd \
            --event deploy \
            --ref "${{ github.sha }}" \
            --outcome success \
            --note "OagFeedStack-dev deployed by CI (infra-oag-event-source.yml)"
        continue-on-error: true

###############################################################################
# Job 3: deploy → PROD (ids-prod 716403253029)
# Requires manual approval via GitHub environment: production.
# §F5 gate: OAG_PROD_DEPLOY_ROLE_ARN must be set (one-time human bootstrap).
#
# To configure the approval gate:
#   1. In the GitHub repository → Settings → Environments → create "production"
#   2. Add the required reviewers (human approvers).
#   3. The deploy-prod job will pause here awaiting approval on every push.
###############################################################################
  deploy-prod:
    name: CDK deploy [prod — ids-prod 716403253029]
    runs-on: ubuntu-latest
    needs: deploy-dev
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production  # §F5 approval gate — pauses for human sign-off

    steps:
      - name: Validate required config — prod (fail-fast §process v15 §33)
        run: |
          missing=""
          [ -z "${{ secrets.OAG_PROD_ACCOUNT_ID }}" ]        && missing="$missing OAG_PROD_ACCOUNT_ID"
          [ -z "${{ secrets.OAG_PROD_DEPLOY_ROLE_ARN }}" ]   && missing="$missing OAG_PROD_DEPLOY_ROLE_ARN"
          [ -z "${{ secrets.OAG_PROD_DASH0_SECRET_ARN }}" ]  && missing="$missing OAG_PROD_DASH0_SECRET_ARN"
          if [ -n "$missing" ]; then
            echo "ERROR: missing required secrets for prod deploy:$missing"
            echo "Run work/OagEventSource/runbook/dev-prod-deploy.md one-time bootstrap first."
            exit 1
          fi
          echo "All required prod secrets present."

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: work/OagEventSource/src/infra/package-lock.json

      - name: Install CDK dependencies
        working-directory: work/OagEventSource/src/infra
        run: npm install

      - name: Build CDK TypeScript
        working-directory: work/OagEventSource/src/infra
        run: npm run build

      - name: Bundle Lambda handler asset (flight-feed-api)
        working-directory: work/OagEventSource/src/app
        run: npm install && npm run bundle:lambda

      - name: Configure AWS credentials (OIDC — prod)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.OAG_PROD_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.OAG_AWS_REGION }}
          role-session-name: oag-infra-prod-${{ github.run_id }}

      - name: CDK diff — OagFeedStack-prod
        working-directory: work/OagEventSource/src/infra
        run: |
          npx cdk diff OagFeedStack-prod \
            -c buildSha=${{ github.sha }}
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.OAG_PROD_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ env.OAG_AWS_REGION }}
          DASH0_SECRET_ARN: ${{ secrets.OAG_PROD_DASH0_SECRET_ARN }}

      - name: CDK deploy — OagFeedStack-prod
        working-directory: work/OagEventSource/src/infra
        run: |
          npx cdk deploy OagFeedStack-prod --require-approval never \
            -c buildSha=${{ github.sha }}
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.OAG_PROD_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ env.OAG_AWS_REGION }}
          DASH0_SECRET_ARN: ${{ secrets.OAG_PROD_DASH0_SECRET_ARN }}

      - name: Smoke gate — verify served sha == deployed sha (prod)
        run: |
          FUNCTION_URL=$(aws cloudformation describe-stacks \
            --stack-name OagFeedStack-prod \
            --region ${{ env.OAG_AWS_REGION }} \
            --query "Stacks[0].Outputs[?OutputKey=='FunctionUrl'].OutputValue" \
            --output text)
          echo "Prod Function URL: $FUNCTION_URL"

          SERVED_VERSION=$(curl -s -o /dev/null -D - "${FUNCTION_URL}streams/flight/events?after=-1" \
            | grep -i "x-service-version" | tr -d '\r' | awk '{print $2}')
          echo "Served version header: $SERVED_VERSION"

          if [ -z "$SERVED_VERSION" ]; then
            echo "WARNING: X-Service-Version header absent — smoke gate advisory"
          elif [ "$SERVED_VERSION" != "${{ github.sha }}" ]; then
            echo "ERROR: served sha ($SERVED_VERSION) != deployed sha (${{ github.sha }})"
            exit 1
          else
            echo "Smoke gate PASS: served sha == deployed sha [prod]"
          fi

      - name: Record DORA deploy event (prod)
        run: |
          python3 .claude/skills/dora-ledger/scripts/dora.py record \
            --project OagEventSource \
            --iteration 4 \
            --slice 004-pull-feed-walking-skeleton \
            --agent cicd \
            --event deploy \
            --ref "${{ github.sha }}" \
            --outcome success \
            --note "OagFeedStack-prod deployed by CI (infra-oag-event-source.yml) — production gate approved"
        continue-on-error: true
