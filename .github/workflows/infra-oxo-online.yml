###############################################################################
# oxo-online — infrastructure pipeline
#
# Triggers on changes to the CDK infra source only. Separate from the app
# deploy pipeline so infra and app changes are independently deployable.
#
# Auth:
#   GitHub OIDC → oxo-infra-deploy role, which can assume the CDK bootstrap
#   roles (cdk-*-deploy-role, cdk-*-file-publishing-role) in the account.
#   Bootstrap was run with --trust 817047731316 to permit this.
#
# GitHub Actions secrets:
#   OXO_ONLINE_INFRA_DEPLOY_ROLE_ARN    arn:aws:iam::817047731316:role/oxo-infra-deploy
#   AWS_ACCOUNT_ID                      817047731316
#
# GitHub Actions variables (optional — custom domain):
#   OXO_ONLINE_DOMAIN_NAME              e.g. oxo.example.com
#
# GitHub Actions secrets (optional — custom domain):
#   ACM_CERT_ARN                        ACM cert ARN in us-east-1
#   HOSTED_ZONE_ID                      Route 53 hosted zone ID
###############################################################################

name: oxo-online — infra

on:
  push:
    branches:
      - main
    paths:
      - 'work/oxo-online/src/infra/**'
      - 'work/oxo-online/src/lambda/**'
      - '.github/workflows/infra-oxo-online.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'work/oxo-online/src/infra/**'
      - 'work/oxo-online/src/lambda/**'
      - '.github/workflows/infra-oxo-online.yml'

concurrency:
  group: infra-oxo-online-prod
  cancel-in-progress: false  # never cancel an in-flight infra deploy

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.OXO_ONLINE_AWS_REGION || 'eu-west-2' }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  infra:
    name: CDK diff / deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            work/oxo-online/src/infra/package-lock.json
            work/oxo-online/src/lambda/package-lock.json

      - name: Install CDK dependencies
        working-directory: work/oxo-online/src/infra
        # npm ci fails on ubuntu runners when the lock file was generated on macOS/arm64:
        # optional platform packages (e.g. rolldown wasm32 bindings) record transitive
        # deps (emnapi) as required but those entries are absent in a mac-generated lock.
        # Use npm install to let npm resolve the current platform's optional packages.
        run: npm install

      - name: Build CDK TypeScript
        working-directory: work/oxo-online/src/infra
        run: npm run build

      - name: Install Lambda dependencies
        working-directory: work/oxo-online/src/lambda
        run: npm ci

      - name: Build Lambda TypeScript
        # CDK fromAsset() requires the compiled dist/ directory to exist at synth time.
        # The Lambda source (src/lambda/**) is gitignored from dist/ so we must build here.
        working-directory: work/oxo-online/src/lambda
        run: npm run build

      - name: Validate required context flags
        # §20 pre-flight: fail fast if the context values the CDK app requires are
        # absent before we spend time on an AWS round-trip.
        run: |
          MISSING=()
          if [ -z "${{ github.repository_owner }}" ]; then MISSING+=(githubOrg); fi
          if [ -z "${{ github.event.repository.name }}" ]; then MISSING+=(githubRepo); fi
          if [ -z "${{ secrets.AWS_ACCOUNT_ID }}" ]; then MISSING+=(AWS_ACCOUNT_ID); fi
          if [ -z "${{ secrets.OXO_ONLINE_INFRA_DEPLOY_ROLE_ARN }}" ]; then MISSING+=(OXO_ONLINE_INFRA_DEPLOY_ROLE_ARN); fi
          if [ ${#MISSING[@]} -ne 0 ]; then
            echo "ERROR: missing required secrets/vars: ${MISSING[*]}"
            exit 1
          fi
          echo "All required context flags present."

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.OXO_ONLINE_INFRA_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: oxo-online-infra-${{ github.run_id }}

      - name: CDK diff — OxoOnlineWafUsEast1 + OxoGameProd + OxoOnlineProd
        # s005-h1: OxoOnlineWafUsEast1 (us-east-1) is diffed alongside the
        # eu-west-2 stacks. CDK needs us-east-1 bootstrap to have been run
        # (see STACK_ORDER.md). crossRegionReferences: true on both WAF and
        # OxoOnlineProd stacks allows CDK to write the WebACL ARN via SSM.
        working-directory: work/oxo-online/src/infra
        run: |
          npx cdk diff OxoOnlineWafUsEast1 OxoGameProd OxoOnlineProd \
            -c githubOrg=${{ github.repository_owner }} \
            -c githubRepo=${{ github.event.repository.name }} \
            -c buildSha=${{ github.sha }}
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ env.AWS_REGION }}

      - name: CDK deploy — OxoOnlineWafUsEast1 (us-east-1; must complete before OxoOnlineProd)
        # s005-h1: OxoOnlineWafUsEast1 deploys FIRST in the sequence.
        # OxoOnlineProd imports its global WebACL ARN via CDK crossRegionReferences
        # (SSM parameter in us-east-1, read by a custom resource in eu-west-2).
        # §39: deploy-role WAFv2 grants MUST be applied via make deploy-oidc
        # BEFORE this step runs (see STACK_ORDER.md + DEPLOY_ROLE_EXTENSIONS.md).
        # PRE-REQUISITE: CDK bootstrap must exist in us-east-1:
        #   cdk bootstrap aws://817047731316/us-east-1 --trust 817047731316 \
        #     --cloudformation-execution-policies arn:aws:iam::aws:policy/AdministratorAccess \
        #     --profile dev-int
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        working-directory: work/oxo-online/src/infra
        run: |
          npx cdk deploy OxoOnlineWafUsEast1 --require-approval never \
            -c githubOrg=${{ github.repository_owner }} \
            -c githubRepo=${{ github.event.repository.name }} \
            -c buildSha=${{ github.sha }}
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: us-east-1

      - name: CDK deploy — OxoGameProd (must complete before OxoOnlineProd)
        # OxoOnlineProd imports OxoGameProd-HttpApiEndpoint via Fn::ImportValue.
        # On first deploy the export does not exist yet, so CDK must deploy
        # OxoGameProd to completion BEFORE starting OxoOnlineProd.
        # Deploy stacks separately (not as a batch) to guarantee sequential order.
        # s005-h1: also deploys the regional WAFv2 WebACL + WS-stage association.
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        working-directory: work/oxo-online/src/infra
        run: |
          npx cdk deploy OxoGameProd --require-approval never \
            -c githubOrg=${{ github.repository_owner }} \
            -c githubRepo=${{ github.event.repository.name }} \
            -c buildSha=${{ github.sha }}

      - name: CDK deploy — OxoOnlineProd (after WAF ARN + OxoGameProd exports exist)
        # s005-h1: OxoOnlineProd now imports the global WebACL ARN from
        # OxoOnlineWafUsEast1 via crossRegionReferences SSM reader, and
        # sets the CloudFront distribution webAclId. Both WAF+OxoGameProd
        # must have completed before this step.
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        working-directory: work/oxo-online/src/infra
        run: |
          npx cdk deploy OxoOnlineProd --require-approval never \
            -c githubOrg=${{ github.repository_owner }} \
            -c githubRepo=${{ github.event.repository.name }} \
            -c buildSha=${{ github.sha }}
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ env.AWS_REGION }}
          ACM_CERT_ARN: ${{ secrets.ACM_CERT_ARN }}
          HOSTED_ZONE_ID: ${{ secrets.HOSTED_ZONE_ID }}
          DOMAIN_NAME: ${{ vars.OXO_ONLINE_DOMAIN_NAME }}
