###############################################################################
# oxo-online — CI/CD pipeline
#
# Triggers:
#   push to main  → full pipeline: install → lint → test → build → deploy
#   pull_request  → install → lint → test → build only (no deploy)
#
# Auth:
#   GitHub OIDC → AWS role assume. No static AWS keys stored anywhere.
#   The role ARN is stored in the GitHub repository secret AWS_DEPLOY_ROLE_ARN.
#
# Environment variables (not secrets — not sensitive):
#   AWS_REGION                  — GitHub Actions variable: eu-west-2
#   CLOUDFRONT_DISTRIBUTION_ID  — GitHub Actions variable
#   S3_BUCKET_NAME              — GitHub Actions variable
#   PROD_URL                    — GitHub Actions variable (e.g. https://oxo.example.com)
#
# Pre-requisites before first run:
#   1. Deploy OxoOnlineOidcStack once manually (see infra/bin/app.ts).
#   2. Add the DeployRoleArn output as GitHub secret: AWS_DEPLOY_ROLE_ARN.
#   3. Add GitHub Actions variables: AWS_REGION, CLOUDFRONT_DISTRIBUTION_ID,
#      S3_BUCKET_NAME, PROD_URL.
#
# Rollback command (re-sync a previous build from S3 versioning):
#   See capabilities.md §Rollback for the exact command sequence.
###############################################################################

name: Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Prevent concurrent deploys — if a new push arrives while one deploy is
# running, cancel the in-flight deploy and start fresh.
concurrency:
  group: deploy-prod
  cancel-in-progress: true

permissions:
  id-token: write   # required for OIDC token request
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # build — runs on every push and every PR
  # ---------------------------------------------------------------------------
  build:
    name: Install / Lint / Test / Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test -- --run

      - name: Build SPA
        run: npm run build

      # Upload the production build so the deploy job can use it without
      # rebuilding.  Artifact is only consumed on main-branch runs.
      - name: Upload build artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: spa-build
          path: app/build/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # deploy — runs only on push to main; depends on build
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to Production
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # AWS credentials via OIDC — no static keys.
      # -----------------------------------------------------------------------
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: oxo-online-deploy-${{ github.run_id }}

      # -----------------------------------------------------------------------
      # CDK deploy — application stack only.
      # The OIDC stack (OxoOnlineOidcStack) is created once manually and must
      # NOT be re-deployed here (it would attempt to recreate the OIDC provider).
      # -----------------------------------------------------------------------
      - name: Set up Node 20 (for CDK)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: infra/package-lock.json

      - name: Install CDK dependencies
        working-directory: infra
        run: npm ci

      - name: Build CDK TypeScript
        working-directory: infra
        run: npm run build

      - name: CDK diff (informational — does not block deploy)
        working-directory: infra
        run: npx cdk diff OxoOnlineProd
        continue-on-error: true

      - name: CDK deploy — OxoOnlineProd
        working-directory: infra
        run: npx cdk deploy OxoOnlineProd --require-approval never --outputs-file cdk-outputs.json
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ vars.AWS_REGION }}
          ACM_CERT_ARN: ${{ secrets.ACM_CERT_ARN }}
          HOSTED_ZONE_ID: ${{ secrets.HOSTED_ZONE_ID }}
          DOMAIN_NAME: ${{ vars.DOMAIN_NAME }}
          GITHUB_ORG: ${{ github.repository_owner }}
          GITHUB_REPO: ${{ github.event.repository.name }}

      # -----------------------------------------------------------------------
      # S3 sync — upload the SPA build artifacts.
      # Cache policy:
      #   index.html → no-cache (always fresh)
      #   JS/CSS bundles (content-hashed filenames) → 1 year
      #   Other assets → 1 day
      # -----------------------------------------------------------------------
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: spa-build
          path: build/

      - name: Sync HTML files (no-cache)
        run: |
          aws s3 sync build/ s3://${{ vars.S3_BUCKET_NAME }}/ \
            --region ${{ vars.AWS_REGION }} \
            --exclude "*" \
            --include "*.html" \
            --cache-control "no-cache, no-store, must-revalidate" \
            --delete

      - name: Sync JS/CSS bundles (1-year cache)
        run: |
          aws s3 sync build/static/ s3://${{ vars.S3_BUCKET_NAME }}/static/ \
            --region ${{ vars.AWS_REGION }} \
            --cache-control "public, max-age=31536000, immutable"

      - name: Sync remaining assets (1-day cache)
        run: |
          aws s3 sync build/ s3://${{ vars.S3_BUCKET_NAME }}/ \
            --region ${{ vars.AWS_REGION }} \
            --exclude "*.html" \
            --exclude "static/*" \
            --cache-control "public, max-age=86400"

      # -----------------------------------------------------------------------
      # CloudFront invalidation — makes the new content live immediately.
      # -----------------------------------------------------------------------
      - name: Invalidate CloudFront cache
        run: |
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*" \
            --query 'Invalidation.Id' \
            --output text)
          echo "Invalidation ID: $INVALIDATION_ID"

      # -----------------------------------------------------------------------
      # DORA deploy event — records the successful deploy to the ledger.
      # -----------------------------------------------------------------------
      - name: Record DORA deploy event
        run: |
          python .claude/skills/dora-ledger/scripts/dora.py record \
            --project oxo-online \
            --iteration 1 \
            --slice 001 \
            --agent cicd \
            --event deploy \
            --outcome success \
            --ref "${{ github.sha }}" \
            --note "Automated deploy to prod via GitHub Actions run ${{ github.run_id }}"
        continue-on-error: true  # Never block a deploy for ledger write failure

      # -----------------------------------------------------------------------
      # Post-deploy smoke test — validates the live prod URL.
      # Runs Playwright in CI; fails the workflow if any check fails.
      # -----------------------------------------------------------------------
      - name: Install Playwright
        run: cd app && npx playwright install --with-deps chromium

      - name: Smoke test — prod URL
        run: cd app && npx playwright test --config=playwright.config.ts tests/smoke/
        env:
          PROD_URL: ${{ vars.PROD_URL }}

      # -----------------------------------------------------------------------
      # DORA failure event — emitted if any deploy/smoke step fails.
      # This step only runs on failure of previous steps.
      # -----------------------------------------------------------------------
      - name: Record DORA failure event
        if: failure()
        run: |
          python .claude/skills/dora-ledger/scripts/dora.py record \
            --project oxo-online \
            --iteration 1 \
            --slice 001 \
            --agent cicd \
            --event failure \
            --outcome fail \
            --ref "${{ github.sha }}" \
            --note "Deploy or smoke test failed — run ${{ github.run_id }}"
        continue-on-error: true
